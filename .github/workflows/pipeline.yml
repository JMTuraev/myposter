name: Claude Auto Builder

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Claude Agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read the GitHub issue and find the website URL.
            Clone that website design with React + Tailwind CSS.
            Create a complete React project in /project folder.
            IMPORTANT: Also create these files:
            1. /project/firebase.json with this content:
            {
              "hosting": {
                "public": "build",
                "ignore": ["firebase.json", "**/.*", "**/node_modules/**"]
              }
            }
            2. /project/.firebaserc with this content:
            {
              "projects": {
                "default": "${{ secrets.FIREBASE_PROJECT_ID }}"
              }
            }
            Then run: cd project && npm install && npm run build

      - name: Deploy to Firebase
        run: |
          cd project
          firebase deploy --only hosting \
            --project ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
