name: Claude Auto Builder

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Claude Agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read the GitHub issue and find the website URL.
            Clone that website with React + Tailwind CSS.
            Create these files in current directory:
            - package.json (with react, react-dom, react-scripts, tailwindcss)
            - public/index.html
            - src/index.js
            - src/App.jsx (clone the website design)
            - tailwind.config.js
            DO NOT run npm install or npm run build.

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Create Firebase config files
        run: |
          echo '{"hosting":{"public":"build","ignore":["firebase.json","**/.*","**/node_modules/**"]}}' > firebase.json
          echo '{"projects":{"default":"${{ secrets.FIREBASE_PROJECT_ID }}"}}' > .firebaserc

      - name: Deploy to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/service-account.json
          firebase deploy --only hosting \
            --project ${{ secrets.FIREBASE_PROJECT_ID }}
