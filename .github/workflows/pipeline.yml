name: Claude Auto Builder

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Claude Agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read the GitHub issue and find the website URL.
            Clone that website with React + Tailwind CSS.
            Create ALL files in the current working directory (not in any subfolder).
            Create these files:
            - package.json
            - src/App.jsx
            - src/index.js
            - public/index.html
            - tailwind.config.js
            - firebase.json with content: {"hosting":{"public":"build","ignore":["firebase.json","**/.*","**/node_modules/**"]}}
            - .firebaserc with content: {"projects":{"default":"${{ secrets.FIREBASE_PROJECT_ID }}"}}
            Then run: npm install && npm run build

      - name: Deploy to Firebase
        run: |
          firebase deploy --only hosting \
            --project ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
